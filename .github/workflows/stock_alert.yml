name: Daily Stock Depletion Alert

on:
  schedule:
    # UTC 00:00 = KST 09:00 (매일 오전 9시 한국시간)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 수동 실행 가능

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install "psycopg[binary]>=3.1"

      - name: Run notifier
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python alerts/notifier.py
